<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>merryguitar</title>
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <header class="gnb">
    <a class="brand" href="./">🎸 merryguitar</a>
    <nav class="nav">
      <a href="./">홈</a>
      <div class="dropdown">
        <button class="dropbtn" aria-haspopup="true" aria-expanded="false">
          (안)유용한 기능 <span class="caret">▾</span>
        </button>
        <div class="menu" role="menu">
          <a href="airguitar/" role="menuitem">🎸 에어 기타</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="hero">
    <h1>쓸데없이 재밌는 것들</h1>
    <p>merryguitar에 모아둔 <b>(안)유용한 기능</b>들.</p>
    <p class="hint">위 메뉴 <b>(안)유용한 기능</b>에 마우스를 올리면(모바일은 탭) 펼쳐집니다.</p>
    <a class="cta" href="airguitar/">🎸 에어 기타 하러 가기</a>
  </main>

  <script>
    // 데스크톱은 hover로 펼쳐지고, 터치 기기는 탭으로 토글한다.
    document.querySelectorAll(".dropdown").forEach((d) => {
      const btn = d.querySelector(".dropbtn");
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        const open = d.classList.toggle("open");
        btn.setAttribute("aria-expanded", open ? "true" : "false");
      });
      document.addEventListener("click", (e) => {
        if (!d.contains(e.target)) {
          d.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    });
  </script>
</body>
</html>
